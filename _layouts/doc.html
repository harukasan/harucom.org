---
layout: default
---
<article class="post doc-layout">

  {%- include breadcrumb.html -%}

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="doc-container">
    <div class="post-content" id="doc-content">
      {{ content }}
    </div>

    <aside class="doc-toc" id="doc-toc">
      <div class="doc-toc-inner">
        <p class="doc-toc-title">Contents</p>
        <nav id="doc-toc-nav"></nav>
      </div>
    </aside>
  </div>

</article>

<script>
(function() {
  var content = document.getElementById('doc-content');
  var nav = document.getElementById('doc-toc-nav');
  var headings = content.querySelectorAll('h2, h3');
  if (headings.length === 0) return;

  var ul = document.createElement('ul');
  ul.className = 'doc-toc-list';

  headings.forEach(function(h) {
    if (!h.id) {
      h.id = h.textContent.trim().toLowerCase()
        .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
    }
    var li = document.createElement('li');
    li.className = 'doc-toc-item doc-toc-' + h.tagName.toLowerCase();
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    a.className = 'doc-toc-link';
    li.appendChild(a);
    ul.appendChild(li);
  });

  nav.appendChild(ul);

  // Highlight active heading on scroll
  var links = nav.querySelectorAll('.doc-toc-link');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        links.forEach(function(link) { link.classList.remove('active'); });
        var active = nav.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '0px 0px -80% 0px', threshold: 0 });

  headings.forEach(function(h) { observer.observe(h); });
})();
</script>
